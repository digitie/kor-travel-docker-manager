    depends_on:
      kor-travel-geo-postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      kor-travel-map-api:
        condition: service_healthy
    command:
    - sh
    - -c
    # PinVi realtime broker is process-local until a shared broker lands.
    # Keep the API at one worker unless the deployment has a broker-compatible override.
    - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PINVI_API_PORT:-12801}
      --workers ${PINVI_API_WORKERS:-1}
    environment:
      PINVI_ENVIRONMENT: local
