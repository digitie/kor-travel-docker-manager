version: 1

port_policy:
  base_port: 12000
  band_size: 100
  api_offset: 1
  service_offset_start: 2
  web_ui_offset: 5
  additional_web_ui_offset_start: 6
  kor_travel_docker_manager_band: 12900
  postgresql_fixed_ports:
    - 5432

dependency_order:
  - db
  - storage
  - gra
  - cadv
  - prom
  - geo
  - conc
  - map
  - pinvi

containers:
  kor-travel-geo-postgresql:
    name: kor-travel-geo-postgres
    compose_service: kor-travel-geo-postgres
    role: postgresql
    display_name: Kor Travel 통합 PostgreSQL / PostGIS
    connection: "postgresql://localhost:5432 (DBs: kor_travel_geo, pinvi, kor_travel_concierge, krtour_map)"
    expected_ports:
      - "5432:5432"
  rustfs:
    name: kor-travel-rustfs
    compose_service: rustfs
    role: rustfs
    display_name: RustFS 공용 오브젝트 스토리지
    connection: "S3 API http://127.0.0.1:12101 / console http://127.0.0.1:12105/rustfs/console/"
    prod_url_env: KTDM_PROD_URL_S3
    expected_ports:
      - "12101:12101"
      - "12105:12105"
  kor-travel-geo-api:
    name: kor-travel-geo-api-latest
    compose_service: kor-travel-geo-api
    role: geocoder-api
    display_name: Kor Travel Geo API
    connection: http://127.0.0.1:12501
    prod_url_env: KTDM_PROD_URL_GEO_API
    expected_ports:
      - "12501:12501"
  kor-travel-geo-ui:
    name: kor-travel-geo-ui-latest
    compose_service: kor-travel-geo-ui
    role: geocoder-ui
    display_name: Kor Travel Geo Web UI
    connection: http://127.0.0.1:12505
    prod_url_env: KTDM_PROD_URL_GEO
    expected_ports:
      - "12505:12505"
  kor-travel-concierge-api:
    name: kor-travel-concierge-api-latest
    compose_service: kor-travel-concierge-api
    role: concierge-api
    display_name: Kor Travel Concierge API
    connection: http://127.0.0.1:12601
    prod_url_env: KTDM_PROD_URL_CONCIERGE_API
    expected_ports:
      - "12601:12601"
  kor-travel-concierge-mcp:
    name: kor-travel-concierge-mcp-latest
    compose_service: kor-travel-concierge-mcp
    role: concierge-mcp
    display_name: Kor Travel Concierge MCP
    connection: http://127.0.0.1:12602/mcp
    prod_url_env: KTDM_PROD_URL_CONCIERGE_MCP
    expected_ports:
      - "12602:12602"
  kor-travel-concierge-scheduler:
    name: kor-travel-concierge-scheduler-latest
    compose_service: kor-travel-concierge-scheduler
    role: concierge-scheduler
    display_name: Kor Travel Concierge Scheduler
    connection: internal scheduler
    expected_ports: []
  kor-travel-concierge-ui:
    name: kor-travel-concierge-ui-latest
    compose_service: kor-travel-concierge-ui
    role: concierge-ui
    display_name: Kor Travel Concierge Web UI
    connection: http://127.0.0.1:12605
    prod_url_env: KTDM_PROD_URL_CONCIERGE
    expected_ports:
      - "12605:12605"
  kor-travel-map-api:
    name: kor-travel-map-api-latest
    compose_service: kor-travel-map-api
    role: map-api
    display_name: Kor Travel Map API
    connection: http://127.0.0.1:12701
    prod_url_env: KTDM_PROD_URL_MAP_API
    expected_ports:
      - "12701:12701"
  kor-travel-map-ui:
    name: kor-travel-map-ui-latest
    compose_service: kor-travel-map-ui
    role: map-ui
    display_name: Kor Travel Map Web UI
    connection: http://127.0.0.1:12705
    prod_url_env: KTDM_PROD_URL_MAP
    expected_ports:
      - "12705:12705"
  kor-travel-map-dagster:
    name: kor-travel-map-dagster-latest
    compose_service: kor-travel-map-dagster
    role: map-dagster
    display_name: Kor Travel Map Dagster
    connection: http://127.0.0.1:12702
    prod_url_env: KTDM_PROD_URL_MAP_DAGSTER
    expected_ports:
      - "12702:12702"
  kor-travel-map-dagster-daemon:
    name: kor-travel-map-dagster-daemon-latest
    compose_service: kor-travel-map-dagster-daemon
    role: map-dagster-daemon
    display_name: Kor Travel Map Dagster Daemon
    connection: internal daemon
    expected_ports: []
  pinvi-api:
    name: pinvi-api-latest
    compose_service: pinvi-api
    role: pinvi-api
    display_name: PinVi API
    connection: http://127.0.0.1:12801
    prod_url_env: KTDM_PROD_URL_PINVI_API
    expected_ports:
      - "12801:12801"
  pinvi-web:
    name: pinvi-web-latest
    compose_service: pinvi-web
    role: pinvi-web
    display_name: PinVi Web UI
    connection: http://127.0.0.1:12805
    prod_url_env: KTDM_PROD_URL_PINVI
    expected_ports:
      - "12805:12805"
  pinvi-dagster:
    name: pinvi-dagster-latest
    compose_service: pinvi-dagster
    role: pinvi-dagster
    display_name: PinVi Dagster
    connection: http://127.0.0.1:12802
    prod_url_env: KTDM_PROD_URL_PINVI_DAGSTER
    expected_ports:
      - "12802:12802"
  prometheus:
    name: kor-travel-prometheus
    compose_service: prometheus
    role: prometheus
    display_name: Prometheus 메트릭 저장소
    connection: http://127.0.0.1:12401
    prod_url_env: KTDM_PROD_URL_PROMETHEUS
    expected_ports:
      - "12401:12401"
  grafana:
    name: kor-travel-grafana
    compose_service: grafana
    role: grafana
    display_name: 공용 Grafana 시각화 도구
    connection: http://127.0.0.1:12205
    prod_url_env: KTDM_PROD_URL_GRAFANA
    expected_ports:
      - "12205:12205"
  cadvisor:
    name: kor-travel-cadvisor
    compose_service: cadvisor
    role: metrics-exporter
    display_name: cAdvisor 컨테이너 메트릭 Exporter
    connection: http://127.0.0.1:12301
    prod_url_env: KTDM_PROD_URL_CADVISOR
    expected_ports:
      - "12301:12301"

targets:
  db:
    port_band: "12000-12099"
    depends_on: []
    display_name: 통합 DB
    description: Kor Travel/PinVi 계열 database를 담는 단일 PostgreSQL/PostGIS 컨테이너입니다.
    aliases:
      - postgresql
      - postgres
      - database
      - shared-postgresql
    services:
      - kor-travel-geo-postgres
    runtime_services:
      - kor-travel-geo-postgres
    containers:
      - kor-travel-geo-postgresql
    init_steps:
      - name: db-schema-recovery
        description: 통합 DB, role, extension, schema grant를 idempotent 방식으로 보정합니다.
        command:
          - exec
          - -T
          - kor-travel-geo-postgres
          - sh
          - /opt/kor-travel-docker-manager/ensure-kor-travel-geo-db.sh

  storage:
    port_band: "12100-12199"
    depends_on: [db]
    display_name: 통합 RustFS
    description: Kor Travel/PinVi 미디어와 원천 데이터를 저장하는 S3 호환 오브젝트 스토리지입니다.
    aliases:
      - rustfs
      - s3
      - object-storage
    services:
      - rustfs
    runtime_services:
      - rustfs
    containers:
      - rustfs
    init_steps:
      - name: rustfs-bucket-recovery
        description: RustFS 기동을 기다린 뒤 공용 bucket을 idempotent 방식으로 보정합니다.
        command:
          - run
          - --rm
          - rustfs-init

  gra:
    port_band: "12200-12299"
    depends_on: [storage]
    display_name: 공용 Grafana
    description: 다른 Kor Travel 앱에서도 공통 연계하는 Grafana Web UI입니다.
    aliases:
      - grafana
      - dashboard
      - visualization
    services:
      - grafana
    runtime_services:
      - grafana
    containers:
      - grafana
    init_steps: []

  cadv:
    port_band: "12300-12399"
    depends_on: [gra]
    display_name: cAdvisor Exporter
    description: Docker 컨테이너 리소스 메트릭을 Prometheus 형식으로 노출합니다.
    aliases:
      - cadvisor
      - exporter
      - metrics-exporter
    services:
      - cadvisor
    runtime_services:
      - cadvisor
    containers:
      - cadvisor
    init_steps: []

  prom:
    port_band: "12400-12499"
    depends_on: [cadv]
    display_name: Prometheus
    description: cAdvisor와 앱 메트릭을 수집하고 Grafana datasource로 제공하는 메트릭 저장소입니다.
    aliases:
      - prometheus
      - metrics
      - monitoring
    services:
      - prometheus
    runtime_services:
      - prometheus
    containers:
      - prometheus
    init_steps: []

  geo:
    port_band: "12500-12599"
    depends_on: [prom]
    display_name: Kor Travel Geo
    description: Kor Travel Geo API/Web UI와 원천 데이터 적재 상태를 관리합니다.
    aliases:
      - kor-travel-geo
      - kor-travel-geo-api
      - geocoder
      - reverse-geocoder
    services:
      - kor-travel-geo-api
      - kor-travel-geo-ui
    runtime_services:
      - kor-travel-geo-api
      - kor-travel-geo-ui
    containers:
      - kor-travel-geo-postgresql
      - rustfs
      - kor-travel-geo-api
      - kor-travel-geo-ui
    init_steps:
      - name: geo-source-verification
        description: /data/juso 마운트와 T-027 계열 핵심 적재 테이블을 검증합니다.
        command:
          - exec
          - -T
          - kor-travel-geo-postgres
          - sh
          - /opt/kor-travel-docker-manager/verify-kor-travel-geo-source.sh

  conc:
    port_band: "12600-12699"
    depends_on: [prom]
    display_name: Kor Travel Concierge
    description: Kor Travel Concierge API/MCP/Scheduler/Web UI를 실행합니다. geo에는 의존하지 않는다.
    aliases:
      - kor-travel-concierge
      - concierge
      - agent
      - conc
    services:
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
    runtime_services:
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
    containers:
      - kor-travel-geo-postgresql
      - rustfs
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
    init_steps: []

  map:
    port_band: "12700-12799"
    depends_on: [geo, conc]
    display_name: Kor Travel Map
    description: Kor Travel Map API/Dagster/Web UI를 실행하며 Kor Travel Geo와 Kor Travel Concierge에 의존한다.
    aliases:
      - kor-travel-map
      - krtour-map
      - python-krtour-map
    services:
      - kor-travel-map-api
      - kor-travel-map-ui
      - kor-travel-map-dagster
      - kor-travel-map-dagster-daemon
    runtime_services:
      - kor-travel-map-api
      - kor-travel-map-ui
      - kor-travel-map-dagster
      - kor-travel-map-dagster-daemon
    containers:
      - kor-travel-geo-postgresql
      - rustfs
      - kor-travel-geo-api
      - kor-travel-geo-ui
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
      - kor-travel-map-api
      - kor-travel-map-ui
      - kor-travel-map-dagster
      - kor-travel-map-dagster-daemon
    init_steps: []

  pinvi:
    port_band: "12800-12899"
    depends_on: [map]
    display_name: PinVi
    description: PinVi API/Web UI/Dagster를 실행하며 Kor Travel Map에 의존한다.
    aliases:
      - srv
      - main
      - pinvi
      - pinvi-api
      - pinvi-web
    services:
      - pinvi-api
      - pinvi-web
      - pinvi-dagster
    runtime_services:
      - pinvi-api
      - pinvi-web
      - pinvi-dagster
    containers:
      - kor-travel-geo-postgresql
      - rustfs
      - kor-travel-geo-api
      - kor-travel-geo-ui
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
      - kor-travel-map-api
      - kor-travel-map-ui
      - kor-travel-map-dagster
      - kor-travel-map-dagster-daemon
      - pinvi-api
      - pinvi-web
      - pinvi-dagster
    init_steps: []

  all:
    display_name: 전체 Kor Travel/PinVi 개발 인프라
    description: dependency_order 전체를 순서대로 실행합니다.
    aliases:
      - default
    include:
      - db
      - storage
      - gra
      - cadv
      - prom
      - geo
      - conc
      - map
      - pinvi
    services: []
    runtime_services: []
    containers:
      - kor-travel-geo-postgresql
      - rustfs
      - grafana
      - cadvisor
      - prometheus
      - kor-travel-geo-api
      - kor-travel-geo-ui
      - kor-travel-concierge-api
      - kor-travel-concierge-mcp
      - kor-travel-concierge-scheduler
      - kor-travel-concierge-ui
      - kor-travel-map-api
      - kor-travel-map-ui
      - kor-travel-map-dagster
      - kor-travel-map-dagster-daemon
      - pinvi-api
      - pinvi-web
      - pinvi-dagster
    init_steps: []
