      KTG_RUSTFS_PREFIX: ${KOR_TRAVEL_GEO_RUSTFS_PREFIX:-kor-travel-geo}
      KTG_RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      KTG_RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
    - ${KOR_TRAVEL_GEO_DAGSTER_PORT:-12502}:${KOR_TRAVEL_GEO_DAGSTER_PORT:-12502}
    healthcheck:
      test:
      - CMD-SHELL
      - >-
        python -c "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/' % os.environ.get('KTG_DAGSTER_PORT', '12502'), timeout=2).read()"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
  kor-travel-geo-dagster-daemon:
    image: ${KOR_TRAVEL_GEO_DAGSTER_IMAGE:-kor-travel-geo-dagster:latest-main}
