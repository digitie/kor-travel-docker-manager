version: 1

port_policy:
  base_port: 12000
  band_size: 100
  api_offset: 1
  service_offset_start: 2
  web_ui_offset: 5
  additional_web_ui_offset_start: 6
  tripmate_manager_band: 12900
  postgresql_fixed_ports:
    - 5432

dependency_order:
  - db
  - storage
  - geo
  - map
  - ai
  - main
  - observability

containers:
  kraddr-geo-postgresql:
    name: kraddr-geo-postgres
    compose_service: kraddr-geo-postgres
    role: postgresql
    display_name: TripMate 통합 PostgreSQL / PostGIS
    connection: "postgresql://localhost:5432 (DBs: kraddr_geo, tripmate, kor_travel_concierge, krtour_map)"
    expected_ports:
      - "5432:5432"
  rustfs:
    name: tripmate-rustfs
    compose_service: rustfs
    role: rustfs
    display_name: RustFS 공용 오브젝트 스토리지
    connection: http://127.0.0.1:12101
    expected_ports:
      - "12101:9000"
      - "12105:9001"
  kraddr-geo-api:
    name: kraddr-geo-api-latest
    compose_service: kraddr-geo-api
    role: geocoder-api
    display_name: Kor Travel Geo API
    connection: http://127.0.0.1:12201
    expected_ports:
      - "12201:12201"
  kraddr-geo-ui:
    name: kraddr-geo-ui-latest
    compose_service: kraddr-geo-ui
    role: geocoder-ui
    display_name: Kor Travel Geo Web UI
    connection: http://127.0.0.1:12205
    expected_ports:
      - "12205:12205"
  prometheus:
    name: tripmate-prometheus
    compose_service: prometheus
    role: prometheus
    display_name: Prometheus 메트릭 저장소
    connection: http://127.0.0.1:12601
    expected_ports:
      - "12601:9090"
  grafana:
    name: tripmate-grafana
    compose_service: grafana
    role: grafana
    display_name: Grafana 시각화 도구
    connection: http://127.0.0.1:12605
    expected_ports:
      - "12605:3000"
  cadvisor:
    name: tripmate-cadvisor
    compose_service: cadvisor
    role: metrics-exporter
    display_name: cAdvisor 컨테이너 메트릭 Exporter
    connection: http://127.0.0.1:12602
    expected_ports:
      - "12602:8080"

targets:
  db:
    port_band: "12000-12099"
    display_name: 통합 DB
    description: TripMate 계열 database를 담는 단일 PostgreSQL/PostGIS 컨테이너입니다.
    aliases:
      - postgresql
      - postgres
      - database
      - shared-postgresql
      - kraddr-geo-postgres
      - kraddr-geo-postgresql
    services:
      - kraddr-geo-postgres
    runtime_services:
      - kraddr-geo-postgres
    containers:
      - kraddr-geo-postgresql
    init_steps:
      - name: db-schema-recovery
        description: 통합 DB, role, extension, schema grant를 idempotent 방식으로 보정합니다.
        command:
          - exec
          - -T
          - kraddr-geo-postgres
          - sh
          - /opt/tripmate-manager/ensure-kraddr-geo-db.sh

  storage:
    port_band: "12100-12199"
    display_name: 통합 RustFS
    description: TripMate 미디어와 원천 데이터를 저장하는 S3 호환 오브젝트 스토리지입니다.
    aliases:
      - rustfs
      - s3
      - object-storage
    services:
      - rustfs
    runtime_services:
      - rustfs
    containers:
      - rustfs
    init_steps:
      - name: rustfs-bucket-recovery
        description: RustFS 기동을 기다린 뒤 공용 bucket을 idempotent 방식으로 보정합니다.
        command:
          - run
          - --rm
          - rustfs-init

  geo:
    port_band: "12200-12299"
    display_name: Kor Travel Geo
    description: Kor Travel Geo API/Web UI와 원천 데이터 적재 상태를 관리합니다.
    aliases:
      - kor-travel-geo
      - kor-travel-geo-api
      - geocoder
      - reverse-geocoder
    services:
      - kraddr-geo-api
      - kraddr-geo-ui
    runtime_services:
      - kraddr-geo-api
      - kraddr-geo-ui
    containers:
      - kraddr-geo-postgresql
      - rustfs
      - kraddr-geo-api
      - kraddr-geo-ui
    init_steps:
      - name: geo-source-verification
        description: /data/juso 마운트와 T-027 계열 핵심 적재 테이블을 검증합니다.
        command:
          - exec
          - -T
          - kraddr-geo-postgres
          - sh
          - /opt/tripmate-manager/verify-kraddr-geo-source.sh

  map:
    port_band: "12300-12399"
    display_name: python-krtour-map
    description: python-krtour-map 개발에 필요한 공용 DB/RustFS 의존성을 실행합니다.
    aliases:
      - krtour-map
      - python-krtour-map
    services: []
    runtime_services: []
    containers:
      - kraddr-geo-postgresql
      - rustfs
      - kraddr-geo-api
      - kraddr-geo-ui
    init_steps: []

  ai:
    port_band: "12400-12499"
    display_name: Kor Travel Concierge
    description: Kor Travel Concierge provider와 krtour-map 연계 개발에 필요한 공용 DB/RustFS 의존성을 실행합니다.
    aliases:
      - kor-travel-concierge
      - concierge
      - agent
    services: []
    runtime_services: []
    containers:
      - kraddr-geo-postgresql
      - rustfs
      - kraddr-geo-api
      - kraddr-geo-ui
    init_steps: []

  main:
    port_band: "12500-12599"
    display_name: TripMate main
    description: TripMate main 서비스 개발에 필요한 공용 DB/RustFS와 krtour-map 의존성을 실행합니다. Kor Travel Concierge는 포함하지 않습니다.
    aliases:
      - tripmate
      - tripmate-api
      - tripmate-web
    include:
      - db
      - storage
      - geo
      - map
    services: []
    runtime_services: []
    containers:
      - kraddr-geo-postgresql
      - rustfs
      - kraddr-geo-api
      - kraddr-geo-ui
    init_steps: []

  observability:
    port_band: "12600-12699"
    display_name: 관측 스택
    description: Prometheus, Grafana, cAdvisor Exporter를 별도 컨테이너로 실행합니다.
    aliases:
      - metrics
      - monitoring
      - prometheus
      - grafana
      - exporter
      - cadvisor
    services:
      - cadvisor
      - prometheus
      - grafana
    runtime_services:
      - cadvisor
      - prometheus
      - grafana
    containers:
      - prometheus
      - grafana
      - cadvisor
    init_steps: []

  all:
    display_name: 전체 TripMate 개발 인프라
    description: dependency_order 전체를 순서대로 실행합니다.
    aliases:
      - default
    include:
      - db
      - storage
      - geo
      - map
      - ai
      - main
      - observability
    services: []
    runtime_services: []
    containers:
      - kraddr-geo-postgresql
      - rustfs
      - kraddr-geo-api
      - kraddr-geo-ui
      - prometheus
      - grafana
      - cadvisor
    init_steps: []
