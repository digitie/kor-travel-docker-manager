name: kor-travel-docker-manager

# 네트워크 모드: dev 기본값은 host 이다. host 모드에서는 포트 NAT가 없으므로 각 컨테이너가
# 호스트 정규 포트(12xxx, 5432)에 직접 바인딩하고, 서비스 간 참조는 127.0.0.1:<포트>를 사용한다.
# (KTDM_DOCKER_NETWORK_MODE=bridge 로 바꾸려면 서비스 간 hostname을 컨테이너명으로 되돌려야 한다.)

services:
  kor-travel-geo-postgres:
    image: postgis/postgis:16-3.5
    container_name: kor-travel-geo-postgres
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    environment:
      POSTGRES_USER: ${KOR_TRAVEL_GEO_POSTGRES_USER:-addr}
      POSTGRES_PASSWORD: ${KOR_TRAVEL_GEO_POSTGRES_PASSWORD:-addr}
      POSTGRES_DB: ${KOR_TRAVEL_GEO_POSTGRES_DB:-kor_travel_geo}
      PINVI_POSTGRES_USER: ${PINVI_POSTGRES_USER:-pinvi}
      PINVI_POSTGRES_PASSWORD: ${PINVI_POSTGRES_PASSWORD:-pinvi_dev_password}
      PINVI_POSTGRES_DB: ${PINVI_POSTGRES_DB:-pinvi}
      KOR_TRAVEL_CONCIERGE_POSTGRES_DB: ${KOR_TRAVEL_CONCIERGE_POSTGRES_DB:-kor_travel_concierge}
      KRTOUR_MAP_POSTGRES_USER: ${KRTOUR_MAP_POSTGRES_USER:-krtour_map}
      KRTOUR_MAP_POSTGRES_PASSWORD: ${KRTOUR_MAP_POSTGRES_PASSWORD:-krtour_map_dev_password}
      KRTOUR_MAP_POSTGRES_DB: ${KRTOUR_MAP_POSTGRES_DB:-krtour_map}
      KOR_TRAVEL_GEO_STRICT_SOURCE_CHECK: ${KOR_TRAVEL_GEO_STRICT_SOURCE_CHECK:-1}
      KOR_TRAVEL_GEO_SOURCE_DIR: ${KOR_TRAVEL_GEO_SOURCE_DIR:-/data/juso}
    ports:
    - ${KOR_TRAVEL_GEO_DB_PORT:-5432}:5432
    volumes:
    - ${KOR_TRAVEL_GEO_PGDATA:-/home/digitie/kor-travel-geo-data/pgdata-final-20260529}:/var/lib/postgresql/data
    - ${KOR_TRAVEL_GEO_JUSO_DATA:-/mnt/f/dev/kor-travel-geo/data/juso}:/data/juso:ro
    - ./scripts/ensure-kor-travel-geo-db.sh:/docker-entrypoint-initdb.d/010-ensure-kor-travel-geo-db.sh:ro
    - ./scripts/ensure-kor-travel-geo-db.sh:/opt/kor-travel-docker-manager/ensure-kor-travel-geo-db.sh:ro
    - ./scripts/verify-kor-travel-geo-source.sh:/opt/kor-travel-docker-manager/verify-kor-travel-geo-source.sh:ro
    shm_size: 512mb
    command:
    - postgres
    - -c
    - shared_preload_libraries=pg_stat_statements
    - -c
    - pg_stat_statements.track=all
    - -c
    - pg_stat_statements.max=10000
    - -c
    - shared_buffers=512MB
    - -c
    - work_mem=64MB
    - -c
    - maintenance_work_mem=256MB
    - -c
    - max_wal_size=2GB
    - -c
    - checkpoint_completion_target=0.9
    - -c
    - effective_cache_size=1536MB
    - -c
    - random_page_cost=1.1
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${KOR_TRAVEL_GEO_POSTGRES_USER:-addr} -d ${KOR_TRAVEL_GEO_POSTGRES_DB:-kor_travel_geo}
      interval: 10s
      timeout: 5s
      retries: 5
  rustfs:
    image: rustfs/rustfs:latest
    container_name: kor-travel-rustfs
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    command:
    - /data
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:${RUSTFS_CONSOLE_CONTAINER_PORT:-12105}
      RUSTFS_CORS_ALLOWED_ORIGINS: '*'
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: '*'
    ports:
    - ${RUSTFS_API_PORT:-12101}:${RUSTFS_API_CONTAINER_PORT:-12101}
    - ${RUSTFS_CONSOLE_PORT:-12105}:${RUSTFS_CONSOLE_CONTAINER_PORT:-12105}
    volumes:
    - ${RUSTFS_DATA_DIR:-/home/digitie/kor-travel-geo-data/rustfs}:/data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:${RUSTFS_API_CONTAINER_PORT:-12101}/health/live
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  rustfs-init:
    image: minio/mc:latest
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_ENDPOINT: http://${KTDM_RUSTFS_INIT_HOST:-127.0.0.1}:${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_API_CONTAINER_PORT: ${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      PINVI_RUSTFS_BUCKET: ${PINVI_RUSTFS_BUCKET:-pinvi-media}
      KOR_TRAVEL_GEO_RUSTFS_BUCKET: ${KOR_TRAVEL_GEO_RUSTFS_BUCKET:-kor-travel-geo}
      KRTOUR_MAP_RUSTFS_BUCKET: ${KRTOUR_MAP_RUSTFS_BUCKET:-krtour-map}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
    volumes:
    - ./scripts/ensure-rustfs-buckets.sh:/opt/kor-travel-docker-manager/ensure-rustfs-buckets.sh:ro
    entrypoint:
    - /bin/sh
    - /opt/kor-travel-docker-manager/ensure-rustfs-buckets.sh
  kor-travel-geo-api:
    image: ${KOR_TRAVEL_GEO_API_IMAGE:-kor-travel-geo-api:latest-main-gdal}
    build:
      context: ${KOR_TRAVEL_GEO_REPO_DIR:-../kor-travel-geo}
      dockerfile: docker/api.Dockerfile
    container_name: ${KOR_TRAVEL_GEO_API_CONTAINER:-kor-travel-geo-api-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    depends_on:
      kor-travel-geo-postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      PORT: ${KOR_TRAVEL_GEO_API_CONTAINER_PORT:-12501}
      KTG_API_HOST: 0.0.0.0
      KTG_PG_DSN: ${KOR_TRAVEL_GEO_DOCKER_PG_DSN:-postgresql+psycopg://addr:addr@127.0.0.1:5432/kor_travel_geo}
      KTG_GEOIP_GATE_MODE: ${KOR_TRAVEL_GEO_GEOIP_GATE_MODE:-off}
      KTG_OPS_TABLE_STATS_CAPTURE_INTERVAL_MINUTES: ${KOR_TRAVEL_GEO_OPS_TABLE_STATS_CAPTURE_INTERVAL_MINUTES:-0}
      KTG_RUSTFS_ENABLED: ${KOR_TRAVEL_GEO_RUSTFS_ENABLED:-1}
      KTG_RUSTFS_ENDPOINT_URL: http://127.0.0.1:${RUSTFS_API_CONTAINER_PORT:-12101}
      KTG_RUSTFS_BUCKET: ${KOR_TRAVEL_GEO_RUSTFS_BUCKET:-kor-travel-geo}
      KTG_RUSTFS_PREFIX: ${KOR_TRAVEL_GEO_RUSTFS_PREFIX:-kor-travel-geo}
      KTG_RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      KTG_RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      KTG_RUSTFS_LOCAL_IMPORT_ROOTS: /data
      KTG_VWORLD_API_KEY: ${KOR_TRAVEL_GEO_VWORLD_API_KEY:-}
      KTG_PUBLIC_API_KEY_CACHE_TTL_S: ${KOR_TRAVEL_GEO_PUBLIC_API_KEY_CACHE_TTL_S:-30}
      KTG_ADMIN_TRUSTED_PROXY_CIDRS: ${KOR_TRAVEL_GEO_ADMIN_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      KTG_ADMIN_PROXY_SECRET: ${KOR_TRAVEL_GEO_ADMIN_PROXY_SECRET:-}
    ports:
    - ${KOR_TRAVEL_GEO_API_PORT:-12501}:${KOR_TRAVEL_GEO_API_CONTAINER_PORT:-12501}
    volumes:
    - ${KOR_TRAVEL_GEO_APP_DATA_DIR:-../kor-travel-geo/data}:/data:ro
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD-SHELL
      - >-
        python -c "import urllib.request; urllib.request.urlopen('http://localhost:${KOR_TRAVEL_GEO_API_CONTAINER_PORT:-12501}/v1/healthz', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
  kor-travel-geo-ui:
    image: ${KOR_TRAVEL_GEO_UI_IMAGE:-kor-travel-geo-ui:latest-main}
    build:
      context: ${KOR_TRAVEL_GEO_REPO_DIR:-../kor-travel-geo}/kor-travel-geo-ui
    container_name: ${KOR_TRAVEL_GEO_UI_CONTAINER:-kor-travel-geo-ui-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    depends_on:
      kor-travel-geo-api:
        condition: service_healthy
    env_file:
    - path: ${KOR_TRAVEL_GEO_UI_ENV_FILE:-.env.kor-travel-geo-ui.local}
      required: false
      format: raw
    environment:
      PORT: ${KOR_TRAVEL_GEO_UI_CONTAINER_PORT:-12505}
      HOSTNAME: 0.0.0.0
      KTG_API_INTERNAL_URL: http://127.0.0.1:${KOR_TRAVEL_GEO_API_CONTAINER_PORT:-12501}
      NEXT_PUBLIC_API_BASE_URL: ${KOR_TRAVEL_GEO_UI_PUBLIC_API_BASE_URL:-/api/proxy}
      NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-}
      KTG_VWORLD_API_KEY: ${KOR_TRAVEL_GEO_VWORLD_API_KEY:-}
      KTG_ADMIN_PROXY_SECRET: ${KOR_TRAVEL_GEO_ADMIN_PROXY_SECRET:-}
      KTG_UI_ADMIN_USERNAME: ${KOR_TRAVEL_GEO_UI_ADMIN_USERNAME:-admin}
      KTG_UI_SESSION_SECRET: ${KOR_TRAVEL_GEO_UI_SESSION_SECRET:-}
    ports:
    - ${KOR_TRAVEL_GEO_UI_PORT:-12505}:${KOR_TRAVEL_GEO_UI_CONTAINER_PORT:-12505}
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD-SHELL
      - >-
        node -e "fetch('http://localhost:' + (process.env.PORT || '12505')).then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
  kor-travel-concierge-api:
    image: ${KOR_TRAVEL_CONCIERGE_API_IMAGE:-kor-travel-concierge-api:latest-main}
    build:
      context: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}
      dockerfile: Dockerfile.python
    container_name: ${KOR_TRAVEL_CONCIERGE_API_CONTAINER:-kor-travel-concierge-api-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    command:
    - python
    - -m
    - ktc.cli
    - api
    - --host
    - 0.0.0.0
    - --port
    - '${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}'
    env_file:
    - path: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}/.env
      required: false
      format: raw
    depends_on:
      kor-travel-geo-postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      DATABASE_URL: ${KOR_TRAVEL_CONCIERGE_DOCKER_DATABASE_URL:-postgresql+asyncpg://addr:addr@127.0.0.1:5432/kor_travel_concierge}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}
      CORS_ALLOW_ORIGINS: '["http://localhost:${KOR_TRAVEL_CONCIERGE_UI_PORT:-12605}","http://127.0.0.1:${KOR_TRAVEL_CONCIERGE_UI_PORT:-12605}"]'
      RUSTFS_ENABLED: 'true'
      RUSTFS_ENDPOINT: http://127.0.0.1:${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_PUBLIC_BASE_URL: http://127.0.0.1:${RUSTFS_API_PORT:-12101}/${KOR_TRAVEL_CONCIERGE_RUSTFS_BUCKET:-kor-travel-concierge}
      RUSTFS_CONSOLE_URL: http://127.0.0.1:${RUSTFS_CONSOLE_PORT:-12105}/rustfs/console/
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET_RAW_VIDEOS: ${KOR_TRAVEL_CONCIERGE_RUSTFS_BUCKET:-kor-travel-concierge}
      RUSTFS_BUCKET_SUBTITLES: ${KOR_TRAVEL_CONCIERGE_RUSTFS_BUCKET:-kor-travel-concierge}
      RUSTFS_BUCKET_FRAMES: ${KOR_TRAVEL_CONCIERGE_RUSTFS_BUCKET:-kor-travel-concierge}
      RUSTFS_OBJECT_PREFIX: ${KOR_TRAVEL_CONCIERGE_RUSTFS_PREFIX:-features}
      RUSTFS_REGION: ${RUSTFS_REGION:-us-east-1}
      RUSTFS_HEALTH_PATH: /health/live
      MEDIA_RETENTION_POLICY: infinite
      FFMPEG_PATH: /usr/bin/ffmpeg
      APP_ENV: ${KOR_TRAVEL_CONCIERGE_APP_ENV:-local}
      API_AUTH_ENABLED: ${KOR_TRAVEL_CONCIERGE_API_AUTH_ENABLED:-false}
      API_KEYS: ${KOR_TRAVEL_CONCIERGE_API_KEYS:-}
    ports:
    - ${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}:${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://127.0.0.1:${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}/health',
        timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
  kor-travel-concierge-mcp:
    image: ${KOR_TRAVEL_CONCIERGE_MCP_IMAGE:-kor-travel-concierge-mcp:latest-main}
    build:
      context: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}
      dockerfile: Dockerfile.python
    container_name: ${KOR_TRAVEL_CONCIERGE_MCP_CONTAINER:-kor-travel-concierge-mcp-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    command:
    - python
    - -m
    - ktc.cli
    - mcp
    env_file:
    - path: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}/.env
      required: false
      format: raw
    depends_on:
      kor-travel-concierge-api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${KOR_TRAVEL_CONCIERGE_DOCKER_DATABASE_URL:-postgresql+asyncpg://addr:addr@127.0.0.1:5432/kor_travel_concierge}
      RUSTFS_ENABLED: 'true'
      RUSTFS_ENDPOINT: http://127.0.0.1:${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: '${KOR_TRAVEL_CONCIERGE_MCP_PORT:-12602}'
      MCP_STREAMABLE_HTTP_PATH: /mcp
      APP_ENV: ${KOR_TRAVEL_CONCIERGE_APP_ENV:-local}
      API_AUTH_ENABLED: ${KOR_TRAVEL_CONCIERGE_API_AUTH_ENABLED:-false}
      API_KEYS: ${KOR_TRAVEL_CONCIERGE_API_KEYS:-}
    ports:
    - ${KOR_TRAVEL_CONCIERGE_MCP_PORT:-12602}:${KOR_TRAVEL_CONCIERGE_MCP_PORT:-12602}
    extra_hosts:
    - host.docker.internal:host-gateway
  kor-travel-concierge-scheduler:
    image: ${KOR_TRAVEL_CONCIERGE_SCHEDULER_IMAGE:-kor-travel-concierge-scheduler:latest-main}
    build:
      context: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}
      dockerfile: Dockerfile.python
    container_name: ${KOR_TRAVEL_CONCIERGE_SCHEDULER_CONTAINER:-kor-travel-concierge-scheduler-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    command:
    - python
    - -m
    - ktc.cli
    - scheduler
    env_file:
    - path: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}/.env
      required: false
      format: raw
    depends_on:
      kor-travel-concierge-api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${KOR_TRAVEL_CONCIERGE_DOCKER_DATABASE_URL:-postgresql+asyncpg://addr:addr@127.0.0.1:5432/kor_travel_concierge}
      RUSTFS_ENABLED: 'true'
      RUSTFS_ENDPOINT: http://127.0.0.1:${RUSTFS_API_CONTAINER_PORT:-12101}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      APP_ENV: ${KOR_TRAVEL_CONCIERGE_APP_ENV:-local}
      API_AUTH_ENABLED: ${KOR_TRAVEL_CONCIERGE_API_AUTH_ENABLED:-false}
      API_KEYS: ${KOR_TRAVEL_CONCIERGE_API_KEYS:-}
      # 자막 비활성/숏폼 영상은 transcript_api·yt-dlp로 자막을 못 받으므로,
      # faster-whisper 오디오 전사 폴백을 켠다(무거움; env로 제어).
      TRANSCRIPT_WHISPER_ENABLED: ${KOR_TRAVEL_CONCIERGE_WHISPER_ENABLED:-true}
      WHISPER_MODEL_SIZE: ${KOR_TRAVEL_CONCIERGE_WHISPER_MODEL_SIZE:-base}
      FFMPEG_PATH: /usr/bin/ffmpeg
    extra_hosts:
    - host.docker.internal:host-gateway
  kor-travel-concierge-ui:
    image: ${KOR_TRAVEL_CONCIERGE_UI_IMAGE:-kor-travel-concierge-ui:latest-main}
    build:
      context: ${KOR_TRAVEL_CONCIERGE_REPO_DIR:-../kor-travel-concierge}/frontend
    container_name: ${KOR_TRAVEL_CONCIERGE_UI_CONTAINER:-kor-travel-concierge-ui-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    command:
    - npm
    - run
    - dev
    - --
    - --hostname
    - 0.0.0.0
    - --port
    - '${KOR_TRAVEL_CONCIERGE_UI_PORT:-12605}'
    depends_on:
      kor-travel-concierge-api:
        condition: service_healthy
    environment:
      BACKEND_ORIGIN: http://127.0.0.1:${KOR_TRAVEL_CONCIERGE_API_PORT:-12601}
      BACKEND_API_KEY: ${KOR_TRAVEL_CONCIERGE_BACKEND_API_KEY:-}
      NEXT_PUBLIC_VWORLD_SERVICE_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-}
    ports:
    - ${KOR_TRAVEL_CONCIERGE_UI_PORT:-12605}:${KOR_TRAVEL_CONCIERGE_UI_PORT:-12605}
  kor-travel-map-api:
    image: ${KOR_TRAVEL_MAP_API_IMAGE:-kor-travel-map-api:latest-main}
    build:
      context: ${KOR_TRAVEL_MAP_REPO_DIR:-../kor-travel-map}
      dockerfile: docker/api.Dockerfile
    container_name: ${KOR_TRAVEL_MAP_API_CONTAINER:-kor-travel-map-api-latest}
    restart: unless-stopped
    network_mode: ${KTDM_DOCKER_NETWORK_MODE:-host}
    depends_on:
      kor-travel-geo-postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      kor-travel-geo-api:
        condition: service_healthy
      kor-travel-concierge-api:
        condition: service_healthy
    environment:
      KOR_TRAVEL_MAP_API_HOST: 0.0.0.0
      KOR_TRAVEL_MAP_API_PORT: ${KOR_TRAVEL_MAP_API_CONTAINER_PORT:-12701}
      KOR_TRAVEL_MAP_API_CORS_ALLOW_ORIGINS: '["${KTDM_PROD_URL_MAP:-http://localhost:${KOR_TRAVEL_MAP_UI_PORT:-12705}}","http://localhost:${KOR_TRAVEL_MAP_UI_PORT:-12705}","http://127.0.0.1:${KOR_TRAVEL_MAP_UI_PORT:-12705}"]'
      KOR_TRAVEL_MAP_API_DAGSTER_URL: http://127.0.0.1:${KOR_TRAVEL_MAP_DAGSTER_CONTAINER_PORT:-12702}
      KOR_TRAVEL_MAP_API_DAGSTER_ALLOWED_HOSTS: '["kor-travel-map-dagster","127.0.0.1","localhost","::1"]'
      KOR_TRAVEL_MAP_PG_DSN: ${KOR_TRAVEL_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://krtour_map:krtour_map_dev_password@127.0.0.1:5432/krtour_map}
      KOR_TRAVEL_MAP_OBJECT_STORE_ENDPOINT_URL: http://127.0.0.1:${RUSTFS_API_CONTAINER_PORT:-12101}
      KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET: ${KRTOUR_MAP_RUSTFS_BUCKET:-krtour-map}
      KOR_TRAVEL_MAP_OBJECT_STORE_REGION: ${KRTOUR_MAP_OBJECT_STORE_REGION:-us-east-1}
      KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      KOR_TRAVEL_MAP_OBJECT_STORE_PUBLIC_BASE_URL: ${KTDM_PROD_URL_S3_API:-http://127.0.0.1:${RUSTFS_API_PORT:-12101}}/${KRTOUR_MAP_RUSTFS_BUCKET:-krtour-map}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY: ${KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY:-}
