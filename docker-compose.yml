services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    container_name: tripmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TRIPMATE_POSTGRES_USER:-tripmate}
      POSTGRES_PASSWORD: ${TRIPMATE_POSTGRES_PASSWORD:-tripmate_dev_password}
      POSTGRES_DB: ${TRIPMATE_POSTGRES_DB:-tripmate}
    ports:
    - ${TRIPMATE_POSTGRES_PORT:-55432}:5432
    volumes:
    - tripmate-pgdata:/var/lib/postgresql/data
    - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${TRIPMATE_POSTGRES_USER:-tripmate} -d ${TRIPMATE_POSTGRES_DB:-tripmate}
      interval: 10s
      timeout: 5s
      retries: 5
  kraddr-geo-postgres:
    image: postgis/postgis:16-3.5
    container_name: kraddr-geo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KRADDR_GEO_POSTGRES_USER:-addr}
      POSTGRES_PASSWORD: ${KRADDR_GEO_POSTGRES_PASSWORD:-addr}
      POSTGRES_DB: ${KRADDR_GEO_POSTGRES_DB:-kraddr_geo}
    ports:
    - ${KRADDR_GEO_DB_PORT:-15434}:5432
    volumes:
    - ${KRADDR_GEO_PGDATA:-/home/digitie/kraddr-geo-data/pgdata-final-20260529}:/var/lib/postgresql/data
    - ${KRADDR_JUSO_DATA:-/mnt/f/dev/python-kraddr-geo/data/juso}:/data/juso:ro
    - ./scripts/init-kraddr-geo.sql:/docker-entrypoint-initdb.d/init-kraddr-geo.sql:ro
    shm_size: 512mb
    command:
    - postgres
    - -c
    - shared_preload_libraries=pg_stat_statements
    - -c
    - pg_stat_statements.track=all
    - -c
    - pg_stat_statements.max=10000
    - -c
    - shared_buffers=512MB
    - -c
    - work_mem=64MB
    - -c
    - maintenance_work_mem=256MB
    - -c
    - max_wal_size=2GB
    - -c
    - checkpoint_completion_target=0.9
    - -c
    - effective_cache_size=1536MB
    - -c
    - random_page_cost=1.1
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${KRADDR_GEO_POSTGRES_USER:-addr} -d ${KRADDR_GEO_POSTGRES_DB:-kraddr_geo}
      interval: 10s
      timeout: 5s
      retries: 5
    networks: []
  rustfs:
    image: rustfs/rustfs:latest
    container_name: tripmate-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: :${RUSTFS_API_CONTAINER_PORT:-9003}
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CONSOLE_ADDRESS: :${RUSTFS_CONSOLE_CONTAINER_PORT:-9004}
    ports:
    - ${RUSTFS_API_PORT:-9003}:${RUSTFS_API_CONTAINER_PORT:-9003}
    - ${RUSTFS_CONSOLE_PORT:-9004}:${RUSTFS_CONSOLE_CONTAINER_PORT:-9004}
    volumes:
    - ${RUSTFS_DATA_DIR:-/home/digitie/kraddr-geo-data/rustfs}:/data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:${RUSTFS_API_CONTAINER_PORT:-9003}/health/live
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: '/bin/sh -c " mc alias set local http://rustfs:${RUSTFS_API_CONTAINER_PORT:-9003}
      ${RUSTFS_ACCESS_KEY:-rustfsadmin} ${RUSTFS_SECRET_KEY:-rustfsadmin}; mc mb -p
      local/${TRIPMATE_RUSTFS_BUCKET:-tripmate-media} || true; mc mb -p local/${KRADDR_GEO_RUSTFS_BUCKET:-kraddr-geo}
      || true; mc mb -p local/${KRTOUR_MAP_RUSTFS_BUCKET:-krtour-map} || true; mc
      mb -p local/${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads} || true; "

      '
volumes:
  tripmate-pgdata: null
