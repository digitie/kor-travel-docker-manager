services:
  kraddr-geo-postgres:
    image: postgis/postgis:16-3.5
    container_name: kraddr-geo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KRADDR_GEO_POSTGRES_USER:-addr}
      POSTGRES_PASSWORD: ${KRADDR_GEO_POSTGRES_PASSWORD:-addr}
      POSTGRES_DB: ${KRADDR_GEO_POSTGRES_DB:-kraddr_geo}
      TRIPMATE_POSTGRES_USER: ${TRIPMATE_POSTGRES_USER:-tripmate}
      TRIPMATE_POSTGRES_PASSWORD: ${TRIPMATE_POSTGRES_PASSWORD:-tripmate_dev_password}
      TRIPMATE_POSTGRES_DB: ${TRIPMATE_POSTGRES_DB:-tripmate}
      TRIPMATE_AGENT_POSTGRES_DB: ${TRIPMATE_AGENT_POSTGRES_DB:-tripmate_agent}
      KRTOUR_MAP_POSTGRES_USER: ${KRTOUR_MAP_POSTGRES_USER:-krtour_map}
      KRTOUR_MAP_POSTGRES_PASSWORD: ${KRTOUR_MAP_POSTGRES_PASSWORD:-krtour_map_dev_password}
      KRTOUR_MAP_POSTGRES_DB: ${KRTOUR_MAP_POSTGRES_DB:-krtour_map}
      KRADDR_GEO_STRICT_SOURCE_CHECK: ${KRADDR_GEO_STRICT_SOURCE_CHECK:-1}
      KRADDR_GEO_SOURCE_DIR: ${KRADDR_GEO_SOURCE_DIR:-/data/juso}
    ports:
    - ${KRADDR_GEO_DB_PORT:-5432}:5432
    volumes:
    - ${KRADDR_GEO_PGDATA:-/home/digitie/kraddr-geo-data/pgdata-final-20260529}:/var/lib/postgresql/data
    - ${KRADDR_JUSO_DATA:-/mnt/f/dev/python-kraddr-geo/data/juso}:/data/juso:ro
    - ./scripts/ensure-kraddr-geo-db.sh:/docker-entrypoint-initdb.d/010-ensure-kraddr-geo-db.sh:ro
    - ./scripts/ensure-kraddr-geo-db.sh:/opt/tripmate-manager/ensure-kraddr-geo-db.sh:ro
    - ./scripts/verify-kraddr-geo-source.sh:/opt/tripmate-manager/verify-kraddr-geo-source.sh:ro
    shm_size: 512mb
    command:
    - postgres
    - -c
    - shared_preload_libraries=pg_stat_statements
    - -c
    - pg_stat_statements.track=all
    - -c
    - pg_stat_statements.max=10000
    - -c
    - shared_buffers=512MB
    - -c
    - work_mem=64MB
    - -c
    - maintenance_work_mem=256MB
    - -c
    - max_wal_size=2GB
    - -c
    - checkpoint_completion_target=0.9
    - -c
    - effective_cache_size=1536MB
    - -c
    - random_page_cost=1.1
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${KRADDR_GEO_POSTGRES_USER:-addr} -d ${KRADDR_GEO_POSTGRES_DB:-kraddr_geo}
      interval: 10s
      timeout: 5s
      retries: 5
    networks: []
  rustfs:
    image: rustfs/rustfs:latest
    container_name: tripmate-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: :${RUSTFS_API_CONTAINER_PORT:-9000}
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CONSOLE_ADDRESS: :${RUSTFS_CONSOLE_CONTAINER_PORT:-9001}
    ports:
    - ${RUSTFS_API_PORT:-12101}:${RUSTFS_API_CONTAINER_PORT:-9000}
    - ${RUSTFS_CONSOLE_PORT:-12105}:${RUSTFS_CONSOLE_CONTAINER_PORT:-9001}
    volumes:
    - ${RUSTFS_DATA_DIR:-/home/digitie/kraddr-geo-data/rustfs}:/data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:${RUSTFS_API_CONTAINER_PORT:-9000}/health/live
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      RUSTFS_API_CONTAINER_PORT: ${RUSTFS_API_CONTAINER_PORT:-9000}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      TRIPMATE_RUSTFS_BUCKET: ${TRIPMATE_RUSTFS_BUCKET:-tripmate-media}
      KRADDR_GEO_RUSTFS_BUCKET: ${KRADDR_GEO_RUSTFS_BUCKET:-kraddr-geo}
      KRTOUR_MAP_RUSTFS_BUCKET: ${KRTOUR_MAP_RUSTFS_BUCKET:-krtour-map}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
    volumes:
    - ./scripts/ensure-rustfs-buckets.sh:/opt/tripmate-manager/ensure-rustfs-buckets.sh:ro
    entrypoint:
    - /bin/sh
    - /opt/tripmate-manager/ensure-rustfs-buckets.sh
